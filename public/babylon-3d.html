<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>JobApply TZ Graph 3D</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" rel="stylesheet">
  <style>
    :root {
      color-scheme: light;
      font-family: Arial, Helvetica, sans-serif;
      background: #111318;
      color: #17202a;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
    }

    body {
      background: #111318;
    }

    #renderCanvas {
      width: 100vw;
      height: 100vh;
      display: block;
      touch-action: none;
      outline: none;
    }

    .topbar,
    .details,
    .statusbar {
      position: fixed;
      z-index: 5;
      background: rgba(248, 250, 252, 0.94);
      border: 1px solid rgba(148, 163, 184, 0.56);
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.18);
    }

    .topbar {
      top: 14px;
      left: 14px;
      width: min(360px, calc(100vw - 28px));
      max-height: calc(100vh - 92px);
      display: grid;
      gap: 8px;
      align-items: start;
      padding: 10px;
      border-radius: 8px;
      overflow: auto;
    }

    .topbar.collapsed {
      width: auto;
      max-height: none;
      overflow: visible;
    }

    .toolbar-head {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    #settingsToggle {
      margin-left: auto;
    }

    .toolbar-body {
      display: grid;
      gap: 8px;
    }

    .topbar.collapsed .toolbar-body,
    .topbar.collapsed .brand {
      display: none;
    }

    .topbar.collapsed #settingsToggle {
      display: none;
    }

    .brand {
      font-weight: 700;
      color: #17202a;
      white-space: nowrap;
    }

    button,
    select,
    input {
      height: 34px;
      border: 1px solid #9fb3c8;
      border-radius: 7px;
      background: #ffffff;
      color: #17202a;
      font: inherit;
      font-size: 14px;
    }

    button {
      min-width: 0;
      width: fit-content;
      padding: 0 10px;
      cursor: pointer;
    }

    .icon-button,
    .toggle-control {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      width: fit-content;
      min-width: 0;
      height: 34px;
      padding: 0 10px;
      border: 1px solid #9fb3c8;
      border-radius: 7px;
      background: #ffffff;
      color: #17202a;
      font-size: 14px;
      white-space: nowrap;
    }

    .icon-button {
      justify-content: center;
    }

    .toggle-control input {
      width: 15px;
      height: 15px;
      padding: 0;
      accent-color: #256f55;
    }

    .toolbar-row {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      align-items: center;
    }

    button:focus-visible,
    select:focus-visible,
    input:focus-visible {
      outline: 2px solid #2f855a;
      outline-offset: 2px;
    }

    select,
    input {
      width: 100%;
      min-width: 0;
      padding: 0 10px;
    }

    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: flex-start;
      align-items: center;
      overflow: hidden;
    }

    .legend-item {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      min-width: 0;
      color: #334155;
      font-size: 12px;
      white-space: nowrap;
    }

    .swatch {
      width: 10px;
      height: 10px;
      flex: 0 0 10px;
      border-radius: 999px;
      border: 1px solid rgba(15, 23, 42, 0.24);
    }

    .details {
      right: 14px;
      bottom: 54px;
      width: min(390px, calc(100vw - 28px));
      min-height: 168px;
      max-height: calc(100vh - 130px);
      overflow: auto;
      padding: 14px;
      border-radius: 8px;
    }

    .details h1 {
      margin: 0 0 8px;
      color: #111827;
      font-size: 18px;
      line-height: 1.25;
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin: 0 0 10px;
    }

    .pill {
      border-radius: 999px;
      padding: 3px 8px;
      background: #eef2f7;
      color: #334155;
      font-size: 12px;
    }

    .details p {
      margin: 0;
      color: #334155;
      line-height: 1.45;
      font-size: 14px;
    }

    .muted {
      color: #64748b;
      font-size: 11px;
    }

    .statusbar {
      left: 14px;
      bottom: 14px;
      min-height: 30px;
      max-width: calc(100vw - 28px);
      padding: 7px 10px;
      border-radius: 8px;
      color: #475569;
      font-size: 13px;
    }

    .cognitive-control {
      position: fixed;
      z-index: 7;
      right: 12px;
      top: 50%;
      height: 220px;
      width: 42px;
      transform: translateY(-50%);
      display: grid;
      place-items: center;
      gap: 6px;
      padding: 8px 4px;
      border: 1px solid rgba(148, 163, 184, 0.7);
      border-radius: 8px;
      background: rgba(255,255,255,0.94);
      box-shadow: 0 10px 26px rgba(15,23,42,0.18);
      color: #475569;
      font-size: 11px;
    }

    .cognitive-control input {
      -webkit-appearance: slider-vertical;
      appearance: slider-vertical;
      width: 28px;
      height: 174px;
      margin: 0;
      padding: 0;
    }

    .label-pop {
      position: fixed;
      z-index: 6;
      pointer-events: none;
      transform: translate(12px, 12px);
      max-width: 280px;
      padding: 7px 9px;
      border-radius: 7px;
      background: rgba(17, 24, 39, 0.9);
      color: #ffffff;
      font-size: 13px;
      line-height: 1.35;
      display: none;
    }

    .time-panel,
    .map-panel {
      position: fixed;
      z-index: 8;
      background: rgba(255, 255, 255, 0.96);
      border: 1px solid rgba(148, 163, 184, 0.7);
      border-radius: 8px;
      box-shadow: 0 14px 34px rgba(15, 23, 42, 0.22);
      color: #17202a;
    }

    .cxtmenu-bridge {
      position: fixed;
      inset: 0;
      z-index: 9;
      pointer-events: none;
    }

    .cxtmenu-bridge .cxtmenu-content {
      display: grid;
      gap: 3px;
      place-items: center;
      color: #ffffff;
      font-family: Arial, sans-serif;
      font-size: 10px;
      line-height: 1.12;
      pointer-events: none;
    }

    .cxtmenu-bridge .cxtmenu-content i {
      font-size: 17px;
    }

    .cxtmenu-bridge .cxtmenu-content span {
      display: block;
      max-width: 58px;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .cxtmenu-bridge .cxtmenu-disabled {
      opacity: 0.38;
    }

    .context-menu {
      display: none;
      position: fixed;
      z-index: 10;
      width: 252px;
      height: 252px;
      color: #17202a;
      transform: translate(-50%, -50%);
      user-select: none;
      --menu-radius: 92px;
      --menu-item: 66px;
    }

    .context-menu::before {
      content: "";
      position: absolute;
      inset: 18px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(15,23,42,0.2) 0 31%, rgba(15,23,42,0.78) 32% 33%, rgba(15,23,42,0.15) 34% 35%, rgba(15,23,42,0.02) 36% 100%);
      pointer-events: none;
    }

    .context-menu button {
      position: absolute;
      width: var(--menu-item);
      height: var(--menu-item);
      min-width: 0;
      margin: 0;
      padding: 0 5px;
      border: 2px solid rgba(255, 255, 255, 0.72);
      border-radius: 50%;
      background: rgba(17, 24, 39, 0.88);
      box-shadow: 0 13px 28px rgba(15, 23, 42, 0.3);
      color: #ffffff;
      font-size: 10px;
      line-height: 1.12;
      text-align: center;
      white-space: normal;
      cursor: pointer;
      display: grid;
      place-items: center;
      transition: transform 120ms ease, background 120ms ease, box-shadow 120ms ease;
    }

    .context-menu button:hover {
      background: rgba(37, 99, 235, 0.94);
      box-shadow: 0 16px 32px rgba(37, 99, 235, 0.34);
      transform: scale(1.08);
    }

    .context-menu .cxtmenu-content {
      display: grid;
      gap: 3px;
      place-items: center;
      pointer-events: none;
    }

    .context-menu .cxtmenu-content i {
      font-size: 17px;
    }

    .context-menu .cxtmenu-content span {
      display: block;
      max-width: 56px;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .context-menu .menu-center {
      position: absolute;
      left: 84px;
      top: 84px;
      width: 84px;
      height: 84px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      border: 3px solid rgba(255, 255, 255, 0.82);
      background: rgba(15, 23, 42, 0.96);
      color: #ffffff;
      box-shadow: 0 16px 34px rgba(15, 23, 42, 0.36);
      font-size: 10px;
      line-height: 1.15;
      text-align: center;
      white-space: pre-line;
      pointer-events: none;
      padding: 8px;
      overflow: hidden;
    }

    .context-menu button[data-action="focus"] { left: 93px; top: 0; }
    .context-menu button[data-action="edit"] { left: 167px; top: 31px; }
    .context-menu button[data-action="labels"] { left: 186px; top: 110px; }
    .context-menu button[data-action="copy-id"] { left: 135px; top: 184px; }
    .context-menu button[data-action="mark-done"] { left: 51px; top: 184px; border-color: #22c55e; }
    .context-menu button[data-action="mark-needed"] { left: 0; top: 110px; border-color: #ef4444; }
    .context-menu button[data-action="mark-testing"] { left: 19px; top: 31px; border-color: #facc15; }
    .context-menu button[data-action="trash"] { left: 93px; top: 184px; border-color: #ef4444; background: rgba(127, 29, 29, 0.92); }

    .context-menu .status-ring {
      position: absolute;
      left: 54px;
      top: 222px;
      width: 144px;
      height: 30px;
      border: 1px solid rgba(148, 163, 184, 0.82);
      border-radius: 999px;
      background: rgba(255,255,255,0.98);
      color: #17202a;
      font-size: 11px;
      padding: 0 8px;
      box-shadow: 0 10px 22px rgba(15, 23, 42, 0.18);
    }

    .settings-panel {
      display: none;
      position: fixed;
      z-index: 11;
      top: 14px;
      right: 14px;
      min-width: 240px;
      gap: 8px;
      padding: 10px;
      border-radius: 8px;
      background: rgba(248, 250, 252, 0.96);
      border: 1px solid rgba(148, 163, 184, 0.56);
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.18);
      color: #17202a;
      font-size: 13px;
    }

    .settings-panel.open {
      display: grid;
    }

    .trash-button {
      min-width: 42px;
      height: 42px;
      display: none;
      align-items: center;
      justify-content: center;
      gap: 5px;
      border: 1px solid rgba(148, 163, 184, 0.7);
      border-radius: 999px;
      background: rgba(248, 250, 252, 0.94);
      color: #64748b;
      box-shadow: 0 10px 26px rgba(15, 23, 42, 0.18);
      font-weight: 700;
      margin-left: auto;
    }

    .trash-button.active {
      display: inline-flex;
      border-color: #ef4444;
      background: #fff7f7;
      color: #991b1b;
    }

    .trash-button span {
      font-size: 12px;
    }

    .trash-panel {
      display: none;
      width: 100%;
      padding: 10px;
      border: 1px solid rgba(148, 163, 184, 0.7);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.98);
      color: #17202a;
      box-shadow: 0 14px 34px rgba(15, 23, 42, 0.22);
      font-size: 13px;
    }

    .trash-confirm {
      display: none;
      position: fixed;
      z-index: 12;
      right: 14px;
      bottom: 64px;
      width: min(320px, calc(100vw - 28px));
      padding: 10px;
      border: 1px solid rgba(148, 163, 184, 0.7);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.98);
      color: #17202a;
      box-shadow: 0 14px 34px rgba(15, 23, 42, 0.22);
      font-size: 13px;
    }

    .trash-panel.open,
    .trash-confirm.open {
      display: grid;
      gap: 8px;
    }

    .trash-panel ul {
      margin: 0;
      padding-left: 18px;
      max-height: 180px;
      overflow: auto;
    }

    .toolbar-footer {
      justify-content: flex-end;
      align-items: flex-end;
    }

    .trash-confirm p {
      margin: 0;
      line-height: 1.35;
      color: #334155;
    }

    .trash-confirm .confirm-row {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
    }

    .trash-confirm .danger {
      border-color: #ef4444;
      background: #991b1b;
      color: #ffffff;
    }

    .settings-panel strong {
      font-size: 14px;
    }

    .settings-panel label {
      display: grid;
      gap: 4px;
      font-size: 12px;
      color: #475569;
    }

    .work-key {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-top: 8px;
      font-size: 12px;
    }

    .work-key span {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      color: #475569;
    }

    .work-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      border: 1px solid rgba(15, 23, 42, 0.18);
    }

    .time-panel,
    .map-panel {
      display: none;
      left: 388px;
      top: 14px;
      width: min(360px, calc(100vw - 28px));
      padding: 10px;
      font-size: 13px;
    }

    .map-panel {
      top: auto;
      bottom: 54px;
      width: 220px;
      height: 150px;
    }

    .edit-form {
      display: grid;
      gap: 8px;
    }

    .edit-form label {
      display: grid;
      gap: 4px;
      font-size: 12px;
      color: #475569;
    }

    .edit-form textarea {
      min-height: 92px;
      resize: vertical;
      border: 1px solid #9fb3c8;
      border-radius: 7px;
      padding: 8px;
      font: inherit;
      font-size: 13px;
    }

    .attachment-list {
      display: grid;
      gap: 4px;
      margin-top: 6px;
      font-size: 12px;
    }

    .attachment-list pre {
      max-height: 220px;
      overflow: auto;
      white-space: pre-wrap;
      word-break: break-word;
      margin: 0;
      padding: 8px;
      border: 1px solid rgba(148, 163, 184, 0.28);
      border-radius: 6px;
      background: rgba(15, 23, 42, 0.58);
      color: #dbeafe;
    }

    .attachment-list table {
      width: 100%;
      border-collapse: collapse;
      font-size: 11px;
    }

    .attachment-list th,
    .attachment-list td {
      border-bottom: 1px solid rgba(148, 163, 184, 0.2);
      padding: 4px 3px;
      text-align: left;
      vertical-align: top;
    }

    @media (max-width: 860px) {
      .topbar {
        width: calc(100vw - 28px);
        max-height: 46vh;
      }

      .details {
        left: 14px;
        right: 14px;
        bottom: 54px;
        width: auto;
        max-height: 34vh;
      }
    }
  </style>
</head>
<body>
  <canvas id="renderCanvas"></canvas>

  <div id="topbar" class="topbar" role="region" aria-label="Graph controls">
    <div class="toolbar-head">
      <button id="menuToggle" class="icon-button" type="button" title="Collapse or expand menu" aria-label="Collapse or expand menu" data-i18n-title="toggleMenu" data-i18n-aria="toggleMenu">
        <i class="fa-solid fa-bars"></i>
      </button>
      <div class="brand" data-i18n="appTitle3d">JobApply TZ graph 3D</div>
      <button id="settingsToggle" class="icon-button" type="button" title="Settings" aria-label="Settings" data-i18n-title="settings" data-i18n-aria="settings">
        <i class="fa-solid fa-gear"></i>
      </button>
    </div>
    <div id="toolbarBody" class="toolbar-body">
      <div class="toolbar-row">
        <select id="graphSelect" aria-label="Graph/project menu" data-i18n-aria="graphProjectMenu"></select>
        <button id="switchView" class="icon-button" type="button" title="Switch to 2D" data-i18n-title="switch2d"><i class="fa-solid fa-layer-group"></i><span data-i18n="switch2d">2D</span></button>
      </div>
      <div class="toolbar-row">
        <select id="layoutSelect" aria-label="Re-arrange layout" data-i18n-aria="rearrangeLayout">
          <option value="development-flow" data-i18n="developmentFlow">Development flow</option>
          <option value="cola">Cola (inf)</option>
          <option value="cose">Cose</option>
          <option value="breadthfirst">Breadthfirst</option>
          <option value="concentric">Concentric</option>
          <option value="circle">Circle</option>
          <option value="grid">Grid</option>
        </select>
        <button id="resetLayout" class="icon-button" type="button" title="Reset layout" data-i18n-title="resetLayout"><i class="fa-solid fa-rotate-left"></i><span data-i18n="reset">Reset</span></button>
      </div>
      <div class="toolbar-row">
        <label class="toggle-control" title="Pause or resume force physics" data-i18n-title="physicsTitle"><input id="togglePhysics" type="checkbox" checked><i class="fa-solid fa-play"></i><span data-i18n="physics">Physics</span></label>
        <label class="toggle-control" title="Show all labels" data-i18n-title="labelsTitle"><input id="showAllLabels" type="checkbox"><i class="fa-solid fa-tags"></i><span data-i18n="labels">Labels</span></label>
        <label class="toggle-control" title="Show time/status panel" data-i18n-title="timeTitle"><input id="showTimePanel" type="checkbox"><i class="fa-solid fa-clock"></i><span data-i18n="time">Time</span></label>
        <label class="toggle-control" title="Show map panel" data-i18n-title="mapTitle"><input id="showMap" type="checkbox"><i class="fa-regular fa-map"></i><span data-i18n="map">Map</span></label>
      </div>
      <div class="toolbar-row">
        <select id="groupFilter" aria-label="Group filter" data-i18n-aria="groupFilter">
          <option value="" data-i18n="allGroups">All groups</option>
        </select>
        <select id="workflowFilter" aria-label="Workflow status filter" data-i18n-aria="workflowStatusFilter">
          <option value="" data-i18n="allWorkflowStates">All workflow states</option>
        </select>
      </div>
      <div class="toolbar-row">
        <input id="degreeFilter" type="number" min="0" step="1" value="0" aria-label="Minimum degree filter" title="Search Filter: degree" data-i18n-aria="degreeFilter" data-i18n-title="degreeFilterTitle">
        <input id="searchBox" type="search" placeholder="Search nodes" aria-label="Search nodes" data-i18n-placeholder="searchNodes" data-i18n-aria="searchNodes">
      </div>
      <div class="toolbar-row">
        <input id="contextSearchBox" type="search" placeholder="Ask context search" aria-label="Context search question" data-i18n-placeholder="contextSearch" data-i18n-aria="contextSearchQuestion">
        <button id="contextSearchButton" class="icon-button" type="button" title="Highlight related nodes" data-i18n-title="highlightRelatedNodes"><i class="fa-solid fa-wand-magic-sparkles"></i><span data-i18n="find">Find</span></button>
      </div>
      <div id="legend" class="legend" aria-label="Group legend"></div>
      <div class="toolbar-row toolbar-footer">
        <button id="trashButton" class="trash-button" type="button" title="Trash is empty" aria-label="Trash is empty" data-i18n-title="trashEmpty" data-i18n-aria="trashEmpty">
          <i class="fa-solid fa-trash"></i><span id="trashCount">0</span>
        </button>
      </div>
      <div id="trashPanel" class="trash-panel" aria-live="polite"></div>
    </div>
  </div>

  <aside id="details" class="details" aria-live="polite">
    <h1 data-i18n="loadingGraph">Loading graph...</h1>
    <div class="meta">
      <span class="pill">Babylon.js</span>
      <span class="pill" data-i18n="force3d">3D force-directed</span>
    </div>
    <p data-i18n="dragHint">Drag to orbit, wheel to zoom, hover or click a node for details.</p>
  </aside>

  <div id="statusbar" class="statusbar" data-i18n="startingScene">Starting 3D scene.</div>
  <label class="cognitive-control" title="Viewport information density" data-i18n-title="viewportInformationDensity">
    <span data-i18n="info">Info</span>
    <input id="cognitiveSlider" type="range" min="1" max="5" step="1" value="3" aria-label="Cognitive load level" data-i18n-aria="cognitiveLoadLevel">
    <span id="cognitiveValue">3</span>
  </label>
  <div id="hoverLabel" class="label-pop"></div>
  <div id="cxtmenuBridge" class="cxtmenu-bridge" aria-hidden="true"></div>
  <div id="contextMenu" class="context-menu" role="menu">
    <button data-action="focus" type="button" title="Focus linked branch" data-i18n-title="focusLinkedBranch"><span class="cxtmenu-content"><i class="fa-solid fa-crosshairs"></i><span data-i18n="focus">Focus</span></span></button>
    <button data-action="edit" type="button" title="Edit title/detail/files" data-i18n-title="editTitleDetailFiles"><span class="cxtmenu-content"><i class="fa-solid fa-pen-to-square"></i><span data-i18n="edit">Edit</span></span></button>
    <button data-action="labels" type="button" title="Show or hide label layer" data-i18n-title="showHideLabelLayer"><span class="cxtmenu-content"><i class="fa-solid fa-tags"></i><span data-i18n="labels">Labels</span></span></button>
    <button data-action="copy-id" type="button" title="Copy node id" data-i18n-title="copyNodeId"><span class="cxtmenu-content"><i class="fa-regular fa-copy"></i><span data-i18n="copy">Copy</span></span></button>
    <button data-action="mark-testing" type="button" title="Yellow: currently being tested" data-i18n-title="testingTitle"><span class="cxtmenu-content"><i class="fa-solid fa-vial-circle-check"></i><span data-i18n="testing">Testing</span></span></button>
    <button data-action="mark-needed" type="button" title="Red: needs implementation or update" data-i18n-title="neededTitle"><span class="cxtmenu-content"><i class="fa-solid fa-circle-exclamation"></i><span data-i18n="needed">Needed</span></span></button>
    <button data-action="mark-done" type="button" title="Green: implemented and merged" data-i18n-title="doneTitle"><span class="cxtmenu-content"><i class="fa-solid fa-check"></i><span data-i18n="done">Done</span></span></button>
    <button data-action="trash" type="button" title="Move node to trash" data-i18n-title="moveNodeToTrash"><span class="cxtmenu-content"><i class="fa-solid fa-trash"></i><span data-i18n="trash">Trash</span></span></button>
    <select id="contextWorkflowState" class="status-ring" title="Set workflow state" data-i18n-title="setWorkflowState"></select>
    <div class="menu-center" data-i18n="nodeActions">Node<br>actions</div>
  </div>
  <div id="settingsPanel" class="settings-panel" role="region" aria-label="Settings" data-i18n-aria="settings">
    <strong data-i18n="settings">Settings</strong>
    <label><span data-i18n="language">Language</span>
      <select id="languageSelect" aria-label="Language" data-i18n-aria="language">
        <option value="uk">Українська</option>
        <option value="en">English</option>
      </select>
    </label>
    <label><span data-i18n="contextMenuStyle">Context menu style</span>
      <select id="contextMenuStyleSelect" aria-label="Context menu style" data-i18n-aria="contextMenuStyle">
        <option value="cytoscape" data-i18n="radialCytoscape">Radial menu (cytoscape)</option>
        <option value="html" data-i18n="radialHtml">Radial menu (HTML buttons)</option>
      </select>
    </label>
  </div>
  <div id="timePanel" class="time-panel"></div>
  <div id="mapPanel" class="map-panel"></div>
  <div id="trashConfirm" class="trash-confirm" role="dialog" aria-modal="false" aria-label="Confirm moving node to trash" data-i18n-aria="confirmMoveNodeToTrash">
    <strong data-i18n="moveNodeToTrashQuestion">Move node to trash?</strong>
    <p id="trashConfirmText"></p>
    <div class="confirm-row">
      <button id="trashCancel" type="button" data-i18n="cancel">Cancel</button>
      <button id="trashConfirmButton" class="danger" type="button" data-i18n="moveToTrash">Move to trash</button>
    </div>
  </div>

  <script src="https://cdn.babylonjs.com/babylon.js"></script>
  <script src="https://unpkg.com/cytoscape@3.34.0/dist/cytoscape.min.js"></script>
  <script src="https://unpkg.com/cytoscape-cxtmenu@3.5.0/cytoscape-cxtmenu.js"></script>
  <script>
    window.GRAPH_UI_BASE_PATH = location.pathname.includes("/job_apply_automation/") ? "/job_apply_automation" : "";
  </script>
  <script src="./js/i18n.js"></script>
  <script src="./js/babylon-3d.js"></script>
</body>
</html>
