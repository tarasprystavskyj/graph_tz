<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>JobApply TZ Graph 3D</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" rel="stylesheet">
  <style>
    :root {
      color-scheme: light;
      font-family: Arial, Helvetica, sans-serif;
      background: #111318;
      color: #17202a;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
    }

    body {
      background: #111318;
    }

    #renderCanvas {
      width: 100vw;
      height: 100vh;
      display: block;
      touch-action: none;
      outline: none;
    }

    .topbar,
    .details,
    .statusbar {
      position: fixed;
      z-index: 5;
      background: rgba(248, 250, 252, 0.94);
      border: 1px solid rgba(148, 163, 184, 0.56);
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.18);
    }

    .topbar {
      top: 14px;
      left: 14px;
      width: min(360px, calc(100vw - 28px));
      max-height: calc(100vh - 92px);
      display: grid;
      gap: 8px;
      align-items: start;
      padding: 10px;
      border-radius: 8px;
      overflow: auto;
    }

    .topbar.collapsed {
      width: auto;
      max-height: none;
      overflow: visible;
    }

    .toolbar-head {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .toolbar-body {
      display: grid;
      gap: 8px;
    }

    .topbar.collapsed .toolbar-body,
    .topbar.collapsed .brand {
      display: none;
    }

    .brand {
      font-weight: 700;
      color: #17202a;
      white-space: nowrap;
    }

    button,
    select,
    input {
      height: 34px;
      border: 1px solid #9fb3c8;
      border-radius: 7px;
      background: #ffffff;
      color: #17202a;
      font: inherit;
      font-size: 14px;
    }

    button {
      min-width: 0;
      width: fit-content;
      padding: 0 10px;
      cursor: pointer;
    }

    .icon-button,
    .toggle-control {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      width: fit-content;
      min-width: 0;
      height: 34px;
      padding: 0 10px;
      border: 1px solid #9fb3c8;
      border-radius: 7px;
      background: #ffffff;
      color: #17202a;
      font-size: 14px;
      white-space: nowrap;
    }

    .icon-button {
      justify-content: center;
    }

    .toggle-control input {
      width: 15px;
      height: 15px;
      padding: 0;
      accent-color: #256f55;
    }

    .toolbar-row {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      align-items: center;
    }

    button:focus-visible,
    select:focus-visible,
    input:focus-visible {
      outline: 2px solid #2f855a;
      outline-offset: 2px;
    }

    select,
    input {
      width: 100%;
      min-width: 0;
      padding: 0 10px;
    }

    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: flex-start;
      align-items: center;
      overflow: hidden;
    }

    .legend-item {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      min-width: 0;
      color: #334155;
      font-size: 12px;
      white-space: nowrap;
    }

    .swatch {
      width: 10px;
      height: 10px;
      flex: 0 0 10px;
      border-radius: 999px;
      border: 1px solid rgba(15, 23, 42, 0.24);
    }

    .details {
      right: 14px;
      bottom: 54px;
      width: min(390px, calc(100vw - 28px));
      min-height: 168px;
      max-height: calc(100vh - 130px);
      overflow: auto;
      padding: 14px;
      border-radius: 8px;
    }

    .details h1 {
      margin: 0 0 8px;
      color: #111827;
      font-size: 18px;
      line-height: 1.25;
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin: 0 0 10px;
    }

    .pill {
      border-radius: 999px;
      padding: 3px 8px;
      background: #eef2f7;
      color: #334155;
      font-size: 12px;
    }

    .details p {
      margin: 0;
      color: #334155;
      line-height: 1.45;
      font-size: 14px;
    }

    .muted {
      color: #64748b;
      font-size: 11px;
    }

    .statusbar {
      left: 14px;
      bottom: 14px;
      min-height: 30px;
      max-width: calc(100vw - 28px);
      padding: 7px 10px;
      border-radius: 8px;
      color: #475569;
      font-size: 13px;
    }

    .cognitive-control {
      position: fixed;
      z-index: 7;
      right: 12px;
      top: 50%;
      height: 220px;
      width: 42px;
      transform: translateY(-50%);
      display: grid;
      place-items: center;
      gap: 6px;
      padding: 8px 4px;
      border: 1px solid rgba(148, 163, 184, 0.7);
      border-radius: 8px;
      background: rgba(255,255,255,0.94);
      box-shadow: 0 10px 26px rgba(15,23,42,0.18);
      color: #475569;
      font-size: 11px;
    }

    .cognitive-control input {
      width: 174px;
      height: 28px;
      transform: rotate(-90deg);
      transform-origin: center;
      padding: 0;
    }

    .label-pop {
      position: fixed;
      z-index: 6;
      pointer-events: none;
      transform: translate(12px, 12px);
      max-width: 280px;
      padding: 7px 9px;
      border-radius: 7px;
      background: rgba(17, 24, 39, 0.9);
      color: #ffffff;
      font-size: 13px;
      line-height: 1.35;
      display: none;
    }

    .time-panel,
    .map-panel {
      position: fixed;
      z-index: 8;
      background: rgba(255, 255, 255, 0.96);
      border: 1px solid rgba(148, 163, 184, 0.7);
      border-radius: 8px;
      box-shadow: 0 14px 34px rgba(15, 23, 42, 0.22);
      color: #17202a;
    }

    .context-menu {
      display: none;
      position: fixed;
      z-index: 9;
      width: 220px;
      height: 220px;
      color: #17202a;
      transform: translate(-50%, -50%);
    }

    .context-menu button {
      position: absolute;
      width: 62px;
      height: 62px;
      min-width: 0;
      margin: 0;
      padding: 0 6px;
      border: 1px solid rgba(148, 163, 184, 0.72);
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.96);
      box-shadow: 0 12px 26px rgba(15, 23, 42, 0.22);
      color: #17202a;
      font-size: 11px;
      line-height: 1.12;
      text-align: center;
      white-space: normal;
      cursor: pointer;
    }

    .context-menu button:hover {
      background: #eef2f7;
      transform: scale(1.06);
    }

    .context-menu .menu-center {
      position: absolute;
      left: 79px;
      top: 79px;
      width: 62px;
      height: 62px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      border: 1px solid rgba(15, 23, 42, 0.22);
      background: rgba(17, 24, 39, 0.94);
      color: #ffffff;
      box-shadow: 0 14px 34px rgba(15, 23, 42, 0.3);
      font-size: 11px;
      text-align: center;
      pointer-events: none;
    }

    .context-menu button[data-action="focus"] { left: 79px; top: 0; }
    .context-menu button[data-action="edit"] { left: 147px; top: 39px; }
    .context-menu button[data-action="labels"] { left: 147px; top: 119px; }
    .context-menu button[data-action="copy-id"] { left: 79px; top: 158px; }
    .context-menu button[data-action="mark-needed"] { left: 11px; top: 119px; border-color: #ef4444; }
    .context-menu button[data-action="mark-testing"] { left: 11px; top: 39px; border-color: #facc15; }
    .context-menu button[data-action="mark-done"] { left: 79px; top: 79px; width: 44px; height: 44px; transform: translate(62px, -62px); border-color: #22c55e; }

    .context-menu .status-ring {
      position: absolute;
      left: 54px;
      top: 178px;
      width: 112px;
      height: 30px;
      border: 1px solid rgba(148, 163, 184, 0.82);
      border-radius: 999px;
      background: rgba(255,255,255,0.98);
      color: #17202a;
      font-size: 11px;
      padding: 0 8px;
      box-shadow: 0 10px 22px rgba(15, 23, 42, 0.18);
    }

    .work-key {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-top: 8px;
      font-size: 12px;
    }

    .work-key span {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      color: #475569;
    }

    .work-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      border: 1px solid rgba(15, 23, 42, 0.18);
    }

    .time-panel,
    .map-panel {
      display: none;
      left: 388px;
      top: 14px;
      width: min(360px, calc(100vw - 28px));
      padding: 10px;
      font-size: 13px;
    }

    .map-panel {
      top: auto;
      bottom: 54px;
      width: 220px;
      height: 150px;
    }

    .edit-form {
      display: grid;
      gap: 8px;
    }

    .edit-form label {
      display: grid;
      gap: 4px;
      font-size: 12px;
      color: #475569;
    }

    .edit-form textarea {
      min-height: 92px;
      resize: vertical;
      border: 1px solid #9fb3c8;
      border-radius: 7px;
      padding: 8px;
      font: inherit;
      font-size: 13px;
    }

    .attachment-list {
      display: grid;
      gap: 4px;
      margin-top: 6px;
      font-size: 12px;
    }

    .attachment-list pre {
      max-height: 220px;
      overflow: auto;
      white-space: pre-wrap;
      word-break: break-word;
      margin: 0;
      padding: 8px;
      border: 1px solid rgba(148, 163, 184, 0.28);
      border-radius: 6px;
      background: rgba(15, 23, 42, 0.58);
      color: #dbeafe;
    }

    .attachment-list table {
      width: 100%;
      border-collapse: collapse;
      font-size: 11px;
    }

    .attachment-list th,
    .attachment-list td {
      border-bottom: 1px solid rgba(148, 163, 184, 0.2);
      padding: 4px 3px;
      text-align: left;
      vertical-align: top;
    }

    @media (max-width: 860px) {
      .topbar {
        width: calc(100vw - 28px);
        max-height: 46vh;
      }

      .details {
        left: 14px;
        right: 14px;
        bottom: 54px;
        width: auto;
        max-height: 34vh;
      }
    }
  </style>
</head>
<body>
  <canvas id="renderCanvas"></canvas>

  <div id="topbar" class="topbar" role="region" aria-label="Graph controls">
    <div class="toolbar-head">
      <button id="menuToggle" class="icon-button" type="button" title="Collapse or expand menu" aria-label="Collapse or expand menu">
        <i class="fa-solid fa-bars"></i>
      </button>
      <div class="brand">JobApply TZ graph 3D</div>
    </div>
    <div id="toolbarBody" class="toolbar-body">
      <div class="toolbar-row">
        <select id="graphSelect" aria-label="Graph/project menu"></select>
        <button id="switchView" class="icon-button" type="button" title="Switch to 2D"><i class="fa-solid fa-layer-group"></i><span>2D</span></button>
      </div>
      <div class="toolbar-row">
        <select id="layoutSelect" aria-label="Re-arrange layout">
          <option value="development-flow">Development flow</option>
          <option value="cola">Cola (inf)</option>
          <option value="cose">Cose</option>
          <option value="breadthfirst">Breadthfirst</option>
          <option value="concentric">Concentric</option>
          <option value="circle">Circle</option>
          <option value="grid">Grid</option>
        </select>
        <button id="resetLayout" class="icon-button" type="button" title="Reset layout"><i class="fa-solid fa-rotate-left"></i><span>Reset</span></button>
      </div>
      <div class="toolbar-row">
        <label class="toggle-control" title="Pause or resume force physics"><input id="togglePhysics" type="checkbox" checked><i class="fa-solid fa-play"></i><span>Physics</span></label>
        <label class="toggle-control" title="Show all labels"><input id="showAllLabels" type="checkbox"><i class="fa-solid fa-tags"></i><span>Labels</span></label>
        <label class="toggle-control" title="Show time/status panel"><input id="showTimePanel" type="checkbox"><i class="fa-solid fa-clock"></i><span>Time</span></label>
        <label class="toggle-control" title="Show map panel"><input id="showMap" type="checkbox"><i class="fa-regular fa-map"></i><span>Map</span></label>
      </div>
      <div class="toolbar-row">
        <select id="groupFilter" aria-label="Group filter">
          <option value="">All groups</option>
        </select>
        <select id="workflowFilter" aria-label="Workflow status filter">
          <option value="">All workflow states</option>
        </select>
      </div>
      <div class="toolbar-row">
        <input id="degreeFilter" type="number" min="0" step="1" value="0" aria-label="Minimum degree filter" title="Search Filter: degree">
        <input id="searchBox" type="search" placeholder="Search nodes" aria-label="Search nodes">
      </div>
      <div class="toolbar-row">
        <input id="contextSearchBox" type="search" placeholder="Ask context search" aria-label="Context search question">
        <button id="contextSearchButton" class="icon-button" type="button" title="Highlight related nodes"><i class="fa-solid fa-wand-magic-sparkles"></i><span>Find</span></button>
      </div>
      <div id="legend" class="legend" aria-label="Group legend"></div>
    </div>
  </div>

  <aside id="details" class="details" aria-live="polite">
    <h1>Loading graph...</h1>
    <div class="meta">
      <span class="pill">Babylon.js</span>
      <span class="pill">3D force-directed</span>
    </div>
    <p>Drag to orbit, wheel to zoom, hover or click a node for details.</p>
  </aside>

  <div id="statusbar" class="statusbar">Starting 3D scene.</div>
  <label class="cognitive-control" title="Viewport information density">
    <span>Info</span>
    <input id="cognitiveSlider" type="range" min="1" max="5" step="1" value="3" aria-label="Cognitive load level">
    <span id="cognitiveValue">3</span>
  </label>
  <div id="hoverLabel" class="label-pop"></div>
  <div id="contextMenu" class="context-menu" role="menu">
    <button data-action="focus" type="button" title="Focus linked branch">Focus</button>
    <button data-action="edit" type="button" title="Edit title/detail/files">Edit</button>
    <button data-action="labels" type="button" title="Show or hide all labels">Labels</button>
    <button data-action="copy-id" type="button" title="Copy node id">Copy ID</button>
    <button data-action="mark-testing" type="button" title="Yellow: currently being tested">Testing</button>
    <button data-action="mark-needed" type="button" title="Red: needs implementation or update">Needed</button>
    <button data-action="mark-done" type="button" title="Green: implemented and merged">Done</button>
    <select id="contextWorkflowState" class="status-ring" title="Set workflow state"></select>
    <div class="menu-center">Node<br>actions</div>
  </div>
  <div id="timePanel" class="time-panel"></div>
  <div id="mapPanel" class="map-panel"></div>

  <script src="https://cdn.babylonjs.com/babylon.js"></script>
  <script src="https://unpkg.com/cytoscape@3.34.0/dist/cytoscape.min.js"></script>
  <script>
    window.GRAPH_UI_BASE_PATH = location.pathname.includes("/job_apply_automation/") ? "/job_apply_automation" : "";
  </script>
  <script src="./js/babylon-3d.js"></script>
</body>
</html>
