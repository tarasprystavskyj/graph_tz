<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>JobApply TZ Variant B</title>
  <style>
    html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; font-family: Arial, Helvetica, sans-serif; background: #f3f4f6; color: #111827; }
    .toolbar { position: fixed; z-index: 4; top: 12px; left: 12px; right: 12px; display: grid; grid-template-columns: auto minmax(180px, 360px) auto auto auto 1fr; gap: 8px; align-items: center; background: rgba(255,255,255,.96); border: 1px solid #cbd5e1; border-radius: 8px; padding: 10px; box-shadow: 0 10px 30px rgba(15,23,42,.12); }
    button, input, select { height: 34px; border: 1px solid #9fb3c8; border-radius: 7px; background: #fff; color: #17202a; font: inherit; font-size: 13px; padding: 0 10px; }
    button { cursor: pointer; }
    input { width: 100%; min-width: 0; }
    #viewport { position: fixed; inset: 66px 0 0 0; overflow: auto; }
    #board { position: relative; min-width: 1400px; min-height: 900px; padding: 40px; transform-origin: 0 0; }
    #edges { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; overflow: visible; }
    .lane-title { position: absolute; top: 12px; font-size: 12px; color: #475569; text-transform: uppercase; letter-spacing: 0; }
    .node-card { position: absolute; width: 235px; min-height: 116px; border: 1px solid #cbd5e1; border-radius: 8px; background: #fff; box-shadow: 0 8px 22px rgba(15,23,42,.10); overflow: hidden; cursor: pointer; }
    .node-card.dimmed { opacity: .18; }
    .node-card.selected { outline: 3px solid #f59e0b; outline-offset: 2px; }
    .node-head { display: grid; grid-template-columns: 34px 1fr; align-items: center; gap: 8px; padding: 8px 10px; color: #fff; font-weight: 700; font-size: 13px; }
    .icon { width: 34px; height: 34px; border-radius: 7px; display: inline-grid; place-items: center; background: rgba(255,255,255,.2); border: 1px solid rgba(255,255,255,.48); flex: 0 0 34px; font-size: 11px; text-align: center; }
    .node-body { padding: 9px 10px; font-size: 12px; color: #334155; line-height: 1.35; }
    .preview { margin-top: 7px; min-height: 46px; border: 1px dashed #cbd5e1; border-radius: 6px; display: grid; grid-template-columns: 42px 1fr; gap: 7px; align-items: center; color: #64748b; background: #f8fafc; text-align: left; padding: 5px 6px; }
    .preview-badge { width: 38px; height: 34px; border-radius: 6px; display: grid; place-items: center; font-weight: 700; font-size: 11px; color: var(--vk-fg, #fff); background: var(--vk-bg, #64748b); }
    .handle { position: absolute; top: 50%; width: 10px; height: 10px; border-radius: 999px; background: #fff; border: 2px solid #64748b; transform: translateY(-50%); }
    .handle.in { left: -6px; }
    .handle.out { right: -6px; }
    #minimap { position: fixed; z-index: 4; left: 12px; bottom: 12px; width: 210px; height: 132px; background: rgba(255,255,255,.94); border: 1px solid #cbd5e1; border-radius: 8px; box-shadow: 0 10px 30px rgba(15,23,42,.12); }
    .details { position: fixed; z-index: 5; right: 12px; bottom: 12px; width: min(420px, calc(100vw - 24px)); background: rgba(255,255,255,.96); border: 1px solid #cbd5e1; border-radius: 8px; padding: 12px; box-shadow: 0 10px 30px rgba(15,23,42,.12); font-size: 13px; color: #334155; line-height: 1.38; }
    .details strong { display: block; color: #111827; font-size: 16px; margin-bottom: 6px; }
    @media (max-width: 880px) { .toolbar { grid-template-columns: 1fr 1fr; } .toolbar input, .toolbar span { grid-column: 1 / -1; } #viewport { inset-top: 116px; } }
  </style>
</head>
<body>
  <section class="toolbar">
    <strong data-i18n="flowCards">Variant B: flow cards</strong>
    <input id="searchBox" type="search" placeholder="Search labels, detail, branch, visual key" data-i18n-placeholder="searchFlow">
    <button id="fitBtn" type="button" data-i18n="fit">Fit</button>
    <button id="resetBtn" type="button" data-i18n="reset">Reset</button>
    <select id="languageSelect" title="Language" aria-label="Language" data-i18n-title="language" data-i18n-aria="language">
      <option value="uk">Українська</option>
      <option value="en">English</option>
    </select>
    <span data-i18n="flowSubtitle">ReactFlow-style density prototype; no runtime React dependency.</span>
  </section>
  <main id="viewport">
    <div id="board">
      <svg id="edges"></svg>
    </div>
  </main>
  <svg id="minimap" aria-label="Graph minimap"></svg>
  <aside id="details" class="details">
    <strong data-i18n="readableCards">Readable branch cards</strong>
    <span data-i18n="flowDetails">This variant tests dense cards, handles, preview keys, and branch metadata before committing to a React Flow dependency.</span>
  </aside>
  <script>
    window.GRAPH_UI_BASE_PATH = location.pathname.includes("/job_apply_automation/") ? "/job_apply_automation" : "";
  </script>
  <script src="./js/i18n.js"></script>
  <script src="./js/flow-variant-b.js"></script>
</body>
</html>
